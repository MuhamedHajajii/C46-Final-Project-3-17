<!-- header banner  -->

<div class="hidden lg:block text-sm border-b border-gray-100 bg-white">
  <div class="container mx-auto px-4">
    <div class="flex justify-between items-center h-10">
      <div class="flex items-center gap-6 text-gray-500">
        <span class="flex items-center gap-2"
          ><svg
            data-prefix="fas"
            data-icon="truck"
            class="svg-inline--fa fa-truck text-primary-600 text-xs"
            role="img"
            viewBox="0 0 576 512"
            aria-hidden="true"
          >
            <path
              fill="currentColor"
              d="M0 96C0 60.7 28.7 32 64 32l288 0c35.3 0 64 28.7 64 64l0 32 50.7 0c17 0 33.3 6.7 45.3 18.7L557.3 192c12 12 18.7 28.3 18.7 45.3L576 384c0 35.3-28.7 64-64 64l-3.3 0c-10.4 36.9-44.4 64-84.7 64s-74.2-27.1-84.7-64l-102.6 0c-10.4 36.9-44.4 64-84.7 64s-74.2-27.1-84.7-64L64 448c-35.3 0-64-28.7-64-64L0 96zM512 288l0-50.7-45.3-45.3-50.7 0 0 96 96 0zM192 424a40 40 0 1 0 -80 0 40 40 0 1 0 80 0zm232 40a40 40 0 1 0 0-80 40 40 0 1 0 0 80z"
            ></path></svg
          ><span>Free Shipping on Orders 500 EGP</span></span
        ><span class="flex items-center gap-2"
          ><svg
            data-prefix="fas"
            data-icon="gift"
            class="svg-inline--fa fa-gift text-primary-600 text-xs"
            role="img"
            viewBox="0 0 512 512"
            aria-hidden="true"
          >
            <path
              fill="currentColor"
              d="M321.5 68.8C329.1 55.9 342.9 48 357.8 48l2.2 0c22.1 0 40 17.9 40 40s-17.9 40-40 40l-73.3 0 34.8-59.2zm-131 0l34.8 59.2-73.3 0c-22.1 0-40-17.9-40-40s17.9-40 40-40l2.2 0c14.9 0 28.8 7.9 36.3 20.8zm89.6-24.3l-24.1 41-24.1-41C215.7 16.9 186.1 0 154.2 0L152 0c-48.6 0-88 39.4-88 88 0 14.4 3.5 28 9.6 40L32 128c-17.7 0-32 14.3-32 32l0 32c0 17.7 14.3 32 32 32l448 0c17.7 0 32-14.3 32-32l0-32c0-17.7-14.3-32-32-32l-41.6 0c6.1-12 9.6-25.6 9.6-40 0-48.6-39.4-88-88-88l-2.2 0c-31.9 0-61.5 16.9-77.7 44.4zM480 272l-200 0 0 208 136 0c35.3 0 64-28.7 64-64l0-144zm-248 0l-200 0 0 144c0 35.3 28.7 64 64 64l136 0 0-208z"
            ></path></svg
          ><span>New Arrivals Daily</span></span
        >
      </div>
      <div class="flex items-center gap-6">
        <div class="flex items-center gap-4 text-gray-500">
          <a
            href="tel:+18001234567"
            class="flex items-center gap-1.5 hover:text-primary-600 transition-colors"
            ><svg
              data-prefix="fas"
              data-icon="phone"
              class="svg-inline--fa fa-phone text-xs"
              role="img"
              viewBox="0 0 512 512"
              aria-hidden="true"
            >
              <path
                fill="currentColor"
                d="M160.2 25C152.3 6.1 131.7-3.9 112.1 1.4l-5.5 1.5c-64.6 17.6-119.8 80.2-103.7 156.4 37.1 175 174.8 312.7 349.8 349.8 76.3 16.2 138.8-39.1 156.4-103.7l1.5-5.5c5.4-19.7-4.7-40.3-23.5-48.1l-97.3-40.5c-16.5-6.9-35.6-2.1-47 11.8l-38.6 47.2C233.9 335.4 177.3 277 144.8 205.3L189 169.3c13.9-11.3 18.6-30.4 11.8-47L160.2 25z"
              ></path></svg
            ><span>+1 (800) 123-4567</span></a
          ><a
            href="mailto:support@freshcart.com"
            class="flex items-center gap-1.5 hover:text-primary-600 transition-colors"
            ><svg
              data-prefix="far"
              data-icon="envelope"
              class="svg-inline--fa fa-envelope text-xs"
              role="img"
              viewBox="0 0 512 512"
              aria-hidden="true"
            >
              <path
                fill="currentColor"
                d="M61.4 64C27.5 64 0 91.5 0 125.4 0 126.3 0 127.1 .1 128L0 128 0 384c0 35.3 28.7 64 64 64l384 0c35.3 0 64-28.7 64-64l0-256-.1 0c0-.9 .1-1.7 .1-2.6 0-33.9-27.5-61.4-61.4-61.4L61.4 64zM464 192.3L464 384c0 8.8-7.2 16-16 16L64 400c-8.8 0-16-7.2-16-16l0-191.7 154.8 117.4c31.4 23.9 74.9 23.9 106.4 0L464 192.3zM48 125.4C48 118 54 112 61.4 112l389.2 0c7.4 0 13.4 6 13.4 13.4 0 4.2-2 8.2-5.3 10.7L280.2 271.5c-14.3 10.8-34.1 10.8-48.4 0L53.3 136.1c-3.3-2.5-5.3-6.5-5.3-10.7z"
              ></path></svg
            ><span>support@freshcart.com</span></a
          >
        </div>

        @if (!userToken()) {
          <span class="w-px h-4 bg-gray-200"></span>
          <div class="flex items-center gap-4">
            <a
              class="flex items-center gap-1.5 text-gray-600 hover:text-primary-600 transition-colors"
              routerLink="/login"
              ><svg
                data-prefix="far"
                data-icon="user"
                class="svg-inline--fa fa-user text-xs w-4"
                role="img"
                viewBox="0 0 448 512"
                aria-hidden="true"
              >
                <path
                  fill="currentColor"
                  d="M144 128a80 80 0 1 1 160 0 80 80 0 1 1 -160 0zm208 0a128 128 0 1 0 -256 0 128 128 0 1 0 256 0zM48 480c0-70.7 57.3-128 128-128l96 0c70.7 0 128 57.3 128 128l0 8c0 13.3 10.7 24 24 24s24-10.7 24-24l0-8c0-97.2-78.8-176-176-176l-96 0C78.8 304 0 382.8 0 480l0 8c0 13.3 10.7 24 24 24s24-10.7 24-24l0-8z"
                ></path></svg
              ><span>Sign In</span></a
            ><a
              class="flex items-center gap-1.5 text-gray-600 hover:text-primary-600 transition-colors"
              routerLink="/register"
              ><svg
                data-prefix="fas"
                data-icon="user-plus"
                class="svg-inline--fa fa-user-plus text-xs"
                role="img"
                viewBox="0 0 640 512"
                aria-hidden="true"
              >
                <path
                  fill="currentColor"
                  d="M136 128a120 120 0 1 1 240 0 120 120 0 1 1 -240 0zM48 482.3C48 383.8 127.8 304 226.3 304l59.4 0c98.5 0 178.3 79.8 178.3 178.3 0 16.4-13.3 29.7-29.7 29.7L77.7 512C61.3 512 48 498.7 48 482.3zM544 96c13.3 0 24 10.7 24 24l0 48 48 0c13.3 0 24 10.7 24 24s-10.7 24-24 24l-48 0 0 48c0 13.3-10.7 24-24 24s-24-10.7-24-24l0-48-48 0c-13.3 0-24-10.7-24-24s10.7-24 24-24l48 0 0-48c0-13.3 10.7-24 24-24z"
                ></path></svg
              ><span>Sign Up</span></a
            >
          </div>
        }
      </div>
    </div>
  </div>
</div>

<!-- main links -->
<nav flowbiteNavbar class="left-0 right-0 sticky top-0 z-40">
  <a flowbiteNavbarBrand routerLink="/">
    <span class="sr-only">Open navbar</span>
    <img src="/images/freshcart-logo.svg" class="h-8" alt="Flowbite Logo" />
  </a>

  <form class="grow px-5">
    <label for="search" class="block mb-2.5 text-sm font-medium text-heading sr-only">Search</label>
    <div class="relative">
      <div class="absolute inset-y-0 inset-s-0 flex items-center ps-3 pointer-events-none">
        <svg
          class="w-4 h-4 text-body"
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          fill="none"
          viewBox="0 0 24 24"
        >
          <path
            stroke="currentColor"
            stroke-linecap="round"
            stroke-width="2"
            d="m21 21-3.5-3.5M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"
          />
        </svg>
      </div>
      <input
        type="search"
        id="search"
        class="block w-full p-3 ps-9 bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand shadow-xs placeholder:text-body"
        placeholder="Search"
        required
      />
      <button
        type="button"
        class="absolute inset-e-1.5 bottom-1.5 text-white bg-primary-400 hover:bg-primary-300 box-border border border-transparent focus:ring-4 focus:ring-brand-medium shadow-xs font-medium leading-5 rounded text-xs px-3 py-1.5 focus:outline-none"
      >
        Search
      </button>
    </div>
  </form>

  <button flowbiteNavbarToggle>
    <flowbite-icon name="bars" class="size-5 stroke-2" />
  </button>
  <div flowbiteNavbarContent>
    <li>
      <a flowbiteNavbarItem routerLink="/"> Home </a>
    </li>
    <li>
      <a flowbiteNavbarItem routerLink="/products"> Shop </a>
    </li>
    <li class="group">
      <a flowbiteNavbarItem routerLink="/categories" class="flex items-center justify-center">
        Categories
        <svg
          class="w-4 h-4 ms-1.5 -me-0.5 group-hover:-rotate-180 duration-300"
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          fill="none"
          viewBox="0 0 24 24"
        >
          <path
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="m19 9-7 7-7-7"
          />
        </svg>
      </a>

      <!-- Dropdown menu -->
      <div
        class="z-10 hidden group-hover:block group-hover:absolute bg-neutral-primary-medium border border-default-medium rounded-base shadow-lg w-44"
      >
        <ul class="p-2 text-sm text-body font-medium" aria-labelledby="dropdownHoverButton">
          <li>
            <a
              href="#"
              class="inline-flex items-center w-full p-2 hover:bg-neutral-tertiary-medium hover:text-heading rounded"
              >Dashboard</a
            >
          </li>
          <li>
            <a
              href="#"
              class="inline-flex items-center w-full p-2 hover:bg-neutral-tertiary-medium hover:text-heading rounded"
              >Settings</a
            >
          </li>
          <li>
            <a
              href="#"
              class="inline-flex items-center w-full p-2 hover:bg-neutral-tertiary-medium hover:text-heading rounded"
              >Earnings</a
            >
          </li>
          <li>
            <a
              href="#"
              class="inline-flex items-center w-full p-2 hover:bg-neutral-tertiary-medium hover:text-heading rounded"
              >Sign out</a
            >
          </li>
        </ul>
      </div>
    </li>
    <li>
      <a flowbiteNavbarItem routerLink="/brands"> Brands </a>
    </li>
    <li>
      <a
        flowbiteNavbarItem
        class="relative p-2.5 rounded-full hover:bg-gray-100 transition-colors group"
        title="Cart"
        routerLink="/cart"
        ><svg
          data-prefix="fas"
          data-icon="cart-shopping"
          class="svg-inline--fa fa-cart-shopping top-0 right-0 m-1 text-xl text-gray-500 group-hover:text-primary-600 transition-colors"
          role="img"
          viewBox="0 0 640 512"
          aria-hidden="true"
        >
          <path
            fill="currentColor"
            d="M24-16C10.7-16 0-5.3 0 8S10.7 32 24 32l45.3 0c3.9 0 7.2 2.8 7.9 6.6l52.1 286.3c6.2 34.2 36 59.1 70.8 59.1L456 384c13.3 0 24-10.7 24-24s-10.7-24-24-24l-255.9 0c-11.6 0-21.5-8.3-23.6-19.7l-5.1-28.3 303.6 0c30.8 0 57.2-21.9 62.9-52.2L568.9 69.9C572.6 50.2 557.5 32 537.4 32l-412.7 0-.4-2c-4.8-26.6-28-46-55.1-46L24-16zM208 512a48 48 0 1 0 0-96 48 48 0 1 0 0 96zm224 0a48 48 0 1 0 0-96 48 48 0 1 0 0 96z"
          ></path></svg
        ><span
          class="absolute top-0.5 right-0.5 size-[18px] rounded-full bg-primary-600 text-white text-[10px] font-bold flex items-center justify-center ring-2 ring-white"
          >9+</span
        ></a
      >
    </li>
  </div>
</nav>
