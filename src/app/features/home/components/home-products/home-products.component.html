<section>
  <div class="container mx-auto">
    <!-- section title -->
    <div class="flex items-center gap-3 my-8">
      <div class="h-8 w-1.5 bg-linear-to-b from-emerald-500 to-emerald-700 rounded-full"></div>
      <h2 class="text-3xl font-bold text-gray-800">
        Featured <span class="text-emerald-600">Products</span>
      </h2>
    </div>

    <!-- section products -->
    @if (!allProducts()) {
      <app-loading-data-spinner />
    } @else {
      <div class="container py-10">
        <div class="grid md:grid-cols-2 lg:grid-cols-4 gap-4">
          @for (prod of allProducts(); track $index) {
            <app-product-card [prod]="prod" />
          }
        </div>
      </div>
    }
  </div>
</section>
