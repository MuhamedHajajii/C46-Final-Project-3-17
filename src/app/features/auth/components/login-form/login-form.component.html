<form [formGroup]="loginForm" (ngSubmit)="onLoginSubmit()" class="space-y-6">
  <div>
    <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
    <div class="relative">
      <input
        class="w-full px-4 py-3 pl-12 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-primary-500 focus:ring-2 focus:ring-primary-100 transition-all"
        placeholder="Enter your email"
        id="email"
        type="email"
        formControlName="email"
      /><svg
        data-prefix="fas"
        data-icon="envelope"
        class="svg-inline--fa fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"
        role="img"
        viewBox="0 0 512 512"
        aria-hidden="true"
      >
        <path
          fill="currentColor"
          d="M48 64c-26.5 0-48 21.5-48 48 0 15.1 7.1 29.3 19.2 38.4l208 156c17.1 12.8 40.5 12.8 57.6 0l208-156c12.1-9.1 19.2-23.3 19.2-38.4 0-26.5-21.5-48-48-48L48 64zM0 196L0 384c0 35.3 28.7 64 64 64l384 0c35.3 0 64-28.7 64-64l0-188-198.4 148.8c-34.1 25.6-81.1 25.6-115.2 0L0 196z"
        ></path>
      </svg>
    </div>
  </div>
  <div>
    <div class="flex items-center justify-between mb-2">
      <label for="password" class="block text-sm font-semibold text-gray-700">Password</label
      ><a
        class="text-sm text-primary-600 hover:text-primary-700 cursor-pointer font-medium"
        href="/forget-password"
        >Forgot Password?</a
      >
    </div>
    <div class="relative">
      <input
        #passwordInput
        id="password"
        class="w-full px-4 py-3 pl-12 pr-12 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-primary-500 focus:ring-2 focus:ring-primary-100 transition-all"
        placeholder="Enter your password"
        type="password"
        formControlName="password"
      />

      <svg
        data-prefix="fas"
        data-icon="lock"
        class="svg-inline--fa fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"
        role="img"
        viewBox="0 0 384 512"
        aria-hidden="true"
      >
        <path
          fill="currentColor"
          d="M128 96l0 64 128 0 0-64c0-35.3-28.7-64-64-64s-64 28.7-64 64zM64 160l0-64C64 25.3 121.3-32 192-32S320 25.3 320 96l0 64c35.3 0 64 28.7 64 64l0 224c0 35.3-28.7 64-64 64L64 512c-35.3 0-64-28.7-64-64L0 224c0-35.3 28.7-64 64-64z"
        ></path>
      </svg>
      <button
        (click)="
          passwordInput.type === 'password'
            ? (passwordInput.type = 'text')
            : (passwordInput.type = 'password')
        "
        type="button"
        class="absolute cursor-pointer right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"
      >
        <svg
          data-prefix="fas"
          data-icon="eye"
          class="svg-inline--fa fa-eye"
          role="img"
          viewBox="0 0 576 512"
          aria-hidden="true"
        >
          <path
            fill="currentColor"
            d="M288 32c-80.8 0-145.5 36.8-192.6 80.6-46.8 43.5-78.1 95.4-93 131.1-3.3 7.9-3.3 16.7 0 24.6 14.9 35.7 46.2 87.7 93 131.1 47.1 43.7 111.8 80.6 192.6 80.6s145.5-36.8 192.6-80.6c46.8-43.5 78.1-95.4 93-131.1 3.3-7.9 3.3-16.7 0-24.6-14.9-35.7-46.2-87.7-93-131.1-47.1-43.7-111.8-80.6-192.6-80.6zM144 256a144 144 0 1 1 288 0 144 144 0 1 1 -288 0zm144-64c0 35.3-28.7 64-64 64-11.5 0-22.3-3-31.7-8.4-1 10.9-.1 22.1 2.9 33.2 13.7 51.2 66.4 81.6 117.6 67.9s81.6-66.4 67.9-117.6c-12.2-45.7-55.5-74.8-101.1-70.8 5.3 9.3 8.4 20.1 8.4 31.7z"
          ></path>
        </svg>
      </button>
    </div>
  </div>
  <div class="flex items-center justify-between">
    <label class="flex items-center"
      ><input
        class="h-4 w-4 text-primary-600 accent-primary-600 border-2 border-gray-300 rounded focus:ring-primary-500"
        type="checkbox"
        name="rememberMe"
      /><span class="ml-3 text-sm text-gray-700">Keep me signed in</span></label
    >
  </div>
  <button
    [disabled]="isLoading()"
    class="w-full bg-primary-600 text-white py-3 px-4 rounded-xl hover:bg-primary-700 transition-all duration-200 font-semibold text-lg shadow-lg hover:shadow-xl disabled:opacity-50 disabled:cursor-not-allowed"
  >
    @if (!isLoading()) {
      Sign In
    } @else {
      Loading... <i class="fas fa-spinner fa-spin"></i>
    }
  </button>

  @if (errorMessage().length) {
    <div class="bg-red-100 my-3 border-l-4 border-red-500 text-red-700 p-4" role="alert">
      <p class="font-bold">{{ errorMessage() }}</p>
    </div>
  }
</form>
